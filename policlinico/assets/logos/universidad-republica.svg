<?xml version="1.0" encoding="UTF-8"?>
<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo azul -->
  <rect x="10" y="10" width="130" height="100" fill="#003366"/>
  
  <!-- Edificio estilizado en blanco -->
  <rect x="50" y="30" width="50" height="40" fill="white"/>
  <rect x="60" y="40" width="30" height="30" fill="#003366"/>
  <rect x="45" y="30" width="5" height="60" fill="white"/>
  <rect x="100" y="30" width="5" height="60" fill="white"/>
  
  <!-- Columnas -->
  <rect x="30" y="60" width="5" height="30" fill="white"/>
  <rect x="40" y="60" width="5" height="30" fill="white"/>
  <rect x="110" y="60" width="5" height="30" fill="white"/>
  <rect x="120" y="60" width="5" height="30" fill="white"/>
  
  <!-- Base -->
  <rect x="25" y="90" width="100" height="5" fill="white"/>
  
  <!-- Texto - UNIVERSIDAD DE LA REPÚBLICA URUGUAY -->
  <text x="75" y="120" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#003366" text-anchor="middle">UNIVERSIDAD</text>
  <text x="75" y="130" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#003366" text-anchor="middle">DE LA REPÚBLICA</text>
  <text x="75" y="140" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#003366" text-anchor="middle">URUGUAY</text>
</svg>